<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W166 MIDI Mapper</title>
    
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
    
    <script src="https://surikov.github.io/webaudiofontdata/sound/0000_JCLive_sf2_file.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Wurlitzer 166 Studio</h1>

    <div class="tabs-nav">
        <button class="tab-btn active" id="tab-import" onclick="openTab('page-import', this)">1. Import & Routing</button>
        <button class="tab-btn" id="tab-editor" onclick="openTab('page-editor', this)">2. Editor / Player</button>
    </div>

    <div id="page-import" class="tab-content active">
        <div class="panel upload-panel">
            <h3>Select a MIDI File to Begin</h3>
            <p>Load your standard MIDI file to start mapping Wurlitzer stops.</p>
            <input type="file" id="midi-upload" accept=".mid,.midi">
        </div>
    </div>

    <div id="page-editor" class="tab-content" style="display: none;">
        
        <div class="transport-bar">
            <button class="btn play-btn" id="play-btn">▶ Play</button>
            <button class="btn stop-btn" id="stop-btn">■ Stop</button>
            <span id="audio-status">🔊 Awaiting MIDI...</span>
        </div>

        <div class="panel">
            <h3>Organ Registration Dashboard</h3>
            <div class="registration-flex">
                
                <div class="division-col" id="col-ch1">
                    <h4>1 Trumpet Melody (Ch 1)</h4>
                    <div class="stop-list">
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="56" checked> 56 Wooden Trumpet</label>
                            <input type="number" class="mapping-input pitch-offset" value="0" title="Pitch Offset">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="68" checked> 68 Baritone</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="61" checked> 61 Brass Trumpet</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="42" checked> 42 Cello</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                    </div>
                </div>

                <div class="division-col" id="col-ch2">
                    <h4>2 Countermelody (Ch 2)</h4>
                    <div class="stop-list">
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="71" checked> 71 Clarinet</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="40" checked> 40 Loud Violin</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="82" checked> 82 Soft Violin</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="75" checked> 75 Flageolet</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="73" checked> 73 Flute</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="19" checked> 19 Prestant</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="20" checked> 20 Undamaris</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="8" checked> 8 Bells</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="10" checked> 10 Unaphone</label>
                            <input type="number" class="mapping-input pitch-offset" value="-12">
                        </div>
                    </div>
                </div>

                <div class="division-col" id="col-ch3">
                    <h4>3 Accompaniment (Ch 3)</h4>
                    <div class="stop-list">
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="70" checked> 70 Open Flute</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="11" checked> 11 Stopped Flute</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="48" checked> 48 Strings</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                    </div>
                </div>

                <div class="division-col" id="col-ch4">
                    <h4>4 Bass (Ch 4)</h4>
                    <div class="stop-list">
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="58" checked> 58 Bass Flute</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="57" checked> 57 Bass Trombone</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                        <div class="stop-row">
                            <label><input type="checkbox" class="stop-toggle" data-preset="50" checked> 50 Tuba</label>
                            <input type="number" class="mapping-input pitch-offset" value="0">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
